name: Build & Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web_2/package-lock.json

      - name: Install dependencies
        working-directory: web_2
        run: npm ci

      - name: Build
        working-directory: web_2
        run: npm run build

      - name: Deploy to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          port: ${{ secrets.IONOS_SFTP_PORT }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASS }}
          local_path: web_2/out/*
          remote_path: /
          sftp_only: true
