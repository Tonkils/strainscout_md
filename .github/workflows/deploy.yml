name: Build & Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web_2/package-lock.json

      - name: Install dependencies
        working-directory: web_2
        run: npm ci

      - name: Build
        working-directory: web_2
        run: npm run build

      - name: Deploy to IONOS via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          port: ${{ secrets.IONOS_SFTP_PORT }}
          username: ${{ secrets.IONOS_SFTP_USER }}
          password: ${{ secrets.IONOS_SFTP_PASS }}
          local_path: web_2/out/*
          remote_path: /
          sftp_only: true

      - name: Log deployment
        run: |
          CATALOG_FILE="web_2/public/data/strainscout_catalog_v10.min.json"
          if [ -f "$CATALOG_FILE" ]; then
            CATALOG_MD5=$(md5sum "$CATALOG_FILE" | cut -d' ' -f1)
          else
            CATALOG_MD5=""
          fi
          FILE_COUNT=$(find web_2/out -type f | wc -l)
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"ts\":\"$TS\",\"mode\":\"github_actions\",\"uploaded\":$FILE_COUNT,\"skipped\":0,\"catalog_md5\":\"$CATALOG_MD5\"}" >> publish/deploy_log.jsonl

      - name: Commit deploy log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publish/deploy_log.jsonl
          git diff --cached --quiet || git commit -m "chore: log GitHub Actions deployment"
          git push
